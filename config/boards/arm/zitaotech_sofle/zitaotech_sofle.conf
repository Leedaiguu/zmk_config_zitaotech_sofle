# Split keyboard indicator sync
CONFIG_ZMK_HID_INDICATORS=y
CONFIG_ZMK_SPLIT_PERIPHERAL_HID_INDICATORS=y

# Encoder support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Combo timing
CONFIG_ZMK_COMBO_TIMEOUT_MS=25

# Pointing device support
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# Allow pointer movement while mouse button is pressed
CONFIG_ZMK_POINTING_BLOCK_WHILE_CLICK=n

# Input subsystem (required for custom trackpoint driver)
CONFIG_INPUT=y

# Event manager stack (prevents overflow with pointing devices)
CONFIG_ZMK_EVENT_MANAGER_THREAD_STACK_SIZE=2048

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y

CONFIG_LOG_MODE_IMMEDIATE=y
